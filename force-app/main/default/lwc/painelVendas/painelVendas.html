<template>
    <lightning-card title="Minhas vendas" icon-name="standard:opportunity">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <template if:true={oportunidades}>
                <template for:each={oportunidades} for:item="opp">
                    <div key={opp.id} class="slds-box slds-box_x-small slds-m-bottom_x-small">
                        <div class="slds-grid slds-grid_align-spread slds-wrap">
                            <div>
                                <p class="slds-text-heading_small">{opp.nome}</p>
                                <p class="slds-text-body_small slds-text-color_weak">
                                    {opp.conta} &middot; {opp.estagio}
                                </p>
                            </div>
                            <div class="slds-text-heading_small slds-text-color_success">
                                <lightning-formatted-number
                                    value={opp.valor}
                                    format-style="currency"
                                    currency-code="BRL">
                                </lightning-formatted-number>
                            </div>
                        </div>
                    </div>
                </template>

                <div class="slds-box slds-theme_shade slds-m-top_small slds-text-align_right">
                    <span class="slds-text-heading_small">Total no funil: </span>
                    <span class="slds-text-heading_small slds-text-color_success">
                        <lightning-formatted-number
                            value={total}
                            format-style="currency"
                            currency-code="BRL">
                        </lightning-formatted-number>
                    </span>
                </div>
            </template>

            <template if:true={erro}>
                <p class="slds-text-color_error">Não foi possível carregar as vendas.</p>
            </template>

        </div>
    </lightning-card>
</template>
